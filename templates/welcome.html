<!DOCTYPE html>
<html class="dark" lang="az">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Arena9 - Xoş Gəldiniz</title>
  <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00ff88",
            "primary-dark": "#00cc6a",
            "background-dark": "#050806",
            "surface": "#0f1412",
            "surface-highlight": "#1a211e",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
          },
          boxShadow: {
            'neon': '0 0 20px rgba(0, 255, 136, 0.15)',
            'neon-strong': '0 0 30px rgba(0, 255, 136, 0.3)',
          }
        },
      },
    }
  </script>
  <style>
    .logo-container {
      animation: slide-up 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      z-index: 10;
    }

    .options-container {
      opacity: 0;
      animation: fade-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }

    @keyframes slide-up {
      0% {
        transform: translateY(30vh) scale(1.1);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .arena-logo {
      transform-origin: center;
      animation: pop-in 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pop-in {
      0% {
        transform: scale(0.8) rotate(-10deg);
        opacity: 0;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .glow-effect {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #00ff88;
      filter: blur(120px);
      opacity: 0.12;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    body {
      min-height: max(884px, 100dvh);
      background-color: #050806;
    }
  </style>
</head>

<body class="bg-background-dark font-display text-white overflow-hidden selection:bg-primary selection:text-black">
  <div class="relative flex h-screen w-full flex-col items-center justify-center p-6">
    <div class="glow-effect top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="glow-effect bottom-[-100px] right-[-100px] w-64 h-64 !opacity-5 !bg-white"></div>

    <div class="logo-container w-full max-w-sm flex flex-col items-center justify-center mb-14">
      <div class="relative flex flex-col items-center text-center">
        <div class="arena-logo relative z-10">
          <div
            class="relative h-32 w-32 flex items-center justify-center bg-gradient-to-b from-surface-highlight to-surface backdrop-blur-xl rounded-[2.5rem] border border-white/5 shadow-neon shadow-primary/5 group">
            <svg class="h-16 w-16 text-primary drop-shadow-[0_0_15px_rgba(0,255,136,0.3)]" fill="none"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L4 5V11.09C4 16.14 7.41 20.9 12 22C16.59 20.9 20 16.14 20 11.09V5L12 2Z" fill="currentColor"
                fill-opacity="0.1" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                stroke-width="1.5"></path>
              <path d="M12 6.5C14.5 6.5 15.5 8 15.5 10C15.5 12.5 13.5 13.5 12 13.5C10.5 13.5 9.5 12.5 9.5 10.5"
                stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              <path d="M15.5 10V14.5C15.5 14.5 15.5 17.5 12 17.5C9.5 17.5 8.5 16 8.5 16" stroke="currentColor"
                stroke-linecap="round" stroke-width="2"></path>
            </svg>
            <div class="absolute inset-0 rounded-[2.5rem] border border-white/5 opacity-50"></div>
          </div>
        </div>
        <h1 class="mt-8 text-5xl font-bold tracking-tighter text-white">Arena9<span
            class="text-primary animate-pulse">.</span></h1>
        <p class="text-white/40 mt-3 text-sm font-medium tracking-[0.2em] uppercase">The Future of Football</p>
      </div>
    </div>

    <div class="options-container w-full max-w-sm space-y-5">
      <div class="mb-10 text-center space-y-1.5">
        <h2 class="text-xl text-white font-medium">Xoş gəldiniz</h2>
        <p class="text-sm text-white/40">Davam etmək üçün rolunuzu seçin</p>
      </div>

      <a href="{{ url_for('login') }}"
        class="group relative flex w-full items-center justify-between rounded-2xl bg-primary hover:bg-primary-dark text-background-dark p-1.5 pr-4 transition-all duration-300 shadow-[0_0_20px_rgba(0,255,136,0.1)] hover:shadow-neon-strong hover:scale-[1.02] active:scale-[0.98]">
        <div
          class="flex h-12 w-12 items-center justify-center rounded-xl bg-black/10 group-hover:bg-black/20 transition-colors">
          <span class="material-symbols-outlined text-[22px]">admin_panel_settings</span>
        </div>
        <span class="flex-1 text-center text-lg font-bold tracking-tight">Admin Girişi</span>
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-black/10 opacity-0 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-1">
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </div>
      </a>

      <a href="{{ url_for('dashboard') }}"
        class="group relative flex w-full items-center justify-between rounded-2xl bg-surface/40 border border-white/5 p-1.5 pr-4 transition-all duration-300 hover:border-primary/30 hover:bg-surface/60 hover:scale-[1.02] active:scale-[0.98]">
        <div
          class="flex h-12 w-12 items-center justify-center rounded-xl bg-white/5 text-white/60 group-hover:text-primary transition-colors group-hover:bg-primary/10">
          <span class="material-symbols-outlined text-[22px]">visibility</span>
        </div>
        <span
          class="flex-1 text-center text-lg font-bold tracking-tight text-white group-hover:text-primary transition-colors">İzləyici
          kimi davam et</span>
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-white/5 opacity-0 transition-all duration-300 group-hover:opacity-100 group-hover:text-primary group-hover:translate-x-1">
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </div>
      </a>

      <div class="pt-10 flex flex-col items-center gap-5">
        <div class="h-px w-16 bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        <p class="text-center text-xs text-white/30 max-w-[260px] leading-relaxed">
          Davam edərək siz bizim <a
            class="text-white/60 hover:text-primary transition-colors underline decoration-white/10 underline-offset-2 hover:decoration-primary/50"
            href="#">Şərtlərimiz</a> və <a
            class="text-white/60 hover:text-primary transition-colors underline decoration-white/10 underline-offset-2 hover:decoration-primary/50"
            href="#">Məxfilik Siyasətimizlə</a> razılaşırsınız.
        </p>
      </div>
    </div>
  </div>
</body>

</html>

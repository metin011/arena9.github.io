<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Arena9 - Maç Ekle</title>
  <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1,GRAD@0,opsz@24&amp;display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#39ff14",
            secondary: "#111111",
            surface: "#1c1c1c",
            "surface-highlight": "#2a2a2a",
            background: "#050505",
          },
          fontFamily: {
            display: ["Space Grotesk", "sans-serif"],
          },
          boxShadow: {
            'neon': '0 0 15px rgba(57, 255, 20, 0.15)',
            'neon-strong': '0 0 20px rgba(57, 255, 20, 0.3)',
          },
          borderRadius: {
            DEFAULT: "0.5rem",
            lg: "1rem",
            xl: "1.5rem",
            '2xl': "2rem",
          },
        },
      },
    };
  </script>
  <style>
    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2339ff14' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.75rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: #111
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px
    }

    .glass-modal {
      background: rgba(18, 18, 18, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body
  class="bg-background text-white font-display antialiased min-h-screen flex flex-col selection:bg-primary selection:text-black">
  <header
    class="flex items-center justify-between px-6 py-5 bg-background/80 backdrop-blur-md sticky top-0 z-30 border-b border-white/5">
    <a href="{{ url_for('matches') }}"
      class="w-10 h-10 flex items-center justify-center rounded-full bg-surface hover:bg-surface-highlight text-white transition-colors border border-white/5">
      <span class="material-symbols-outlined text-[20px]">arrow_back</span>
    </a>
    <h1 class="text-lg font-bold tracking-tight uppercase">Maç Ekle</h1>
    <div class="w-10"></div>
  </header>

  <main class="flex-grow p-5 space-y-8 pb-32">
    <form method="POST" action="{{ url_for('admin_add_match') }}" id="matchForm">
      <!-- Hidden Fields -->
      <input type="hidden" name="goals_data" id="goals_data_hidden">
      <input type="hidden" name="home_lineup" id="home_lineup_hidden">
      <input type="hidden" name="away_lineup" id="away_lineup_hidden">
      <input type="hidden" name="home_score" id="home_score_hidden" value="0">
      <input type="hidden" name="away_score" id="away_score_hidden" value="0">

      <section class="space-y-5">
        <div class="flex items-center gap-3">
          <div class="h-6 w-1 bg-primary rounded-full shadow-[0_0_10px_#39ff14]"></div>
          <h2 class="text-xl font-bold tracking-tight">Maç Detayları</h2>
        </div>

        <div class="grid grid-cols-1 gap-5">
          <div class="group">
            <label
              class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
              for="match-name">Maç Adı</label>
            <input
              class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 placeholder-white/20 transition-all duration-300"
              id="match-name" name="name" placeholder="Örn: Final Karşılaşması" type="text" required />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="date">Tarih</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300 [color-scheme:dark]"
                id="date" name="match_date" type="date" required />
            </div>
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="time">Saat</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300 [color-scheme:dark]"
                id="time" name="match_time" type="time" value="21:00" required />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="stadium">Stadyum</label>
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-white/30 group-focus-within:text-primary transition-colors">
                  <span class="material-symbols-outlined text-[20px]">stadium</span>
                </span>
                <input
                  class="w-full pl-12 bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 placeholder-white/20 transition-all duration-300"
                  id="stadium" name="stadium" placeholder="Stadyum Adı" type="text" />
              </div>
            </div>
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="season">Mevsim</label>
              <select
                class="form-select w-full appearance-none bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 pr-10 transition-all duration-300"
                name="season" id="season">
                <option value="24/25">24/25</option>
                <option value="23/24">23/24</option>
                <option value="22/23">22/23</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="team1">Ev Sahibi Takım</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300"
                name="home_team" id="team1" placeholder="Ev Sahibi" required />
            </div>
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="team2">Deplasman Takımı</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300"
                name="away_team" id="team2" placeholder="Deplasman" required />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="home_xg">Ev xG</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300"
                name="home_xg" id="home_xg" type="number" step="0.1" value="0.0" />
            </div>
            <div class="group">
              <label
                class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
                for="away_xg">Deplasman xG</label>
              <input
                class="w-full bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all duration-300"
                name="away_xg" id="away_xg" type="number" step="0.1" value="0.0" />
            </div>
          </div>

          <div class="group">
            <label
              class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1 group-focus-within:text-primary transition-colors"
              for="mvp">Maçın Adamı (POTM)</label>
            <select
              class="form-select w-full appearance-none bg-surface text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 pr-10 transition-all duration-300"
              name="mvp_player_id" id="mvp">
              <option value="">Seçilmedi</option>
              {% for p in players %}
              <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </section>

      <!-- Lineups Section (Added) -->
      <section class="space-y-4 pt-4">
        <div class="flex items-center gap-3">
          <div class="h-6 w-1 bg-primary rounded-full shadow-[0_0_10px_#39ff14]"></div>
          <h2 class="text-xl font-bold tracking-tight">Kadrolar</h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-2">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Ev Sahibi Kadrosu</p>
            <button type="button" onclick="openPlayerModal('home')"
              class="w-full bg-surface text-white rounded-xl h-14 flex items-center justify-between px-5 hover:bg-surface-highlight transition-all border border-white/10">
              <span id="home_count_label">Oyuncu Seçilmedi</span>
              <span class="material-symbols-outlined text-primary text-[20px]">group_add</span>
            </button>
            <div id="home_selected_list" class="flex flex-wrap gap-2 pt-1 px-1"></div>
          </div>
          <div class="space-y-2">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Deplasman Kadrosu</p>
            <button type="button" onclick="openPlayerModal('away')"
              class="w-full bg-surface text-white rounded-xl h-14 flex items-center justify-between px-5 hover:bg-surface-highlight transition-all border border-white/10">
              <span id="away_count_label">Oyuncu Seçilmedi</span>
              <span class="material-symbols-outlined text-primary text-[20px]">group_add</span>
            </button>
            <div id="away_selected_list" class="flex flex-wrap gap-2 pt-1 px-1"></div>
          </div>
        </div>
      </section>

      <section class="space-y-4 pt-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-6 w-1 bg-primary rounded-full shadow-[0_0_10px_#39ff14]"></div>
            <h2 class="text-xl font-bold tracking-tight">Goller</h2>
          </div>
          <span id="goal_count_badge"
            class="text-xs font-mono text-primary bg-primary/10 px-2 py-1 rounded border border-primary/20">0 GOL</span>
        </div>

        <div id="goals_list" class="space-y-3">
          <p class="text-sm text-gray-500 text-center py-4">Henüz gol eklenmedi</p>
        </div>
      </section>

      <section class="relative overflow-hidden rounded-3xl bg-surface border border-white/10 p-6 shadow-2xl mt-8">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="relative z-10 space-y-5">
          <div class="flex items-center gap-3 border-b border-white/10 pb-4">
            <div class="p-2 bg-primary/10 rounded-lg text-primary">
              <span class="material-symbols-outlined text-[24px]">add_circle</span>
            </div>
            <div>
              <h2 class="text-lg font-bold text-white">Yeni Gol Ekle</h2>
              <p class="text-xs text-white/40">Skor tablosunu güncelle</p>
            </div>
          </div>

          <div class="space-y-4">
            <div class="group">
              <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1"
                for="goal-minute">Dakika</label>
              <div class="relative">
                <input
                  class="w-full bg-background text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 text-center font-mono text-xl tracking-widest placeholder-white/20 transition-all"
                  id="goal-minute" placeholder="00" type="number" />
                <span class="absolute inset-y-0 right-5 flex items-center text-primary font-bold text-lg">'</span>
              </div>
            </div>

            <div class="group">
              <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1"
                for="scoring-team">Gol Atan Takım</label>
              <select
                class="form-select w-full appearance-none bg-background text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all"
                id="scoring-team">
                <option value="home" id="opt_home">Ev Sahibi</option>
                <option value="away" id="opt_away">Deplasman</option>
              </select>
            </div>

            <div class="grid grid-cols-1 gap-4">
              <div class="group">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1"
                  for="scorer">Golü Atan</label>
                <select
                  class="form-select w-full appearance-none bg-background text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all text-sm"
                  id="scorer">
                  <option value="">Oyuncu Seçiniz</option>
                  {% for p in players %}
                  <option value="{{ p.id }}" data-photo="{{ p.photo_url or '' }}">{{ p.name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="group">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1"
                  for="assist">Asist (Opsiyonel)</label>
                <select
                  class="form-select w-full appearance-none bg-background text-white rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-5 transition-all text-sm"
                  id="assist">
                  <option value="">Yok</option>
                  {% for p in players %}
                  <option value="{{ p.id }}">{{ p.name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>

            <button type="button" onclick="addGoal()"
              class="w-full h-14 mt-4 bg-primary text-black font-bold text-base rounded-xl flex items-center justify-center gap-2 hover:bg-white hover:text-black hover:shadow-neon transition-all duration-300 transform active:scale-95">
              <span class="material-symbols-outlined text-[20px]">check</span>
              Listeye Ekle
            </button>
          </div>
        </div>
      </section>
    </form>
  </main>

  <footer class="fixed bottom-0 w-full bg-background/90 backdrop-blur-xl p-5 border-t border-white/5 z-40">
    <div class="flex gap-4 max-w-lg mx-auto">
      <a href="{{ url_for('matches') }}"
        class="flex-1 rounded-xl h-14 flex items-center justify-center font-bold text-sm bg-transparent text-white/60 border border-white/10 hover:bg-white/5 hover:text-white transition-colors">
        İptal
      </a>
      <button type="submit" form="matchForm"
        class="flex-1 rounded-xl h-14 text-center font-bold text-sm bg-primary text-black shadow-neon hover:shadow-neon-strong hover:bg-white transition-all duration-300">
        Maçı Kaydet
      </button>
    </div>
  </footer>

  <!-- Player Selection Modal (Redesigned) -->
  <div id="playerModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-end sm:items-center justify-center">
    <div
      class="glass-modal w-full sm:max-w-md sm:rounded-3xl rounded-t-[2.5rem] max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
      <div class="p-6 border-b border-white/5 flex items-center justify-between bg-surface/50">
        <h3 class="text-xl font-bold tracking-tight" id="modal_title_text">Kadro Seçimi</h3>
        <button type="button" onclick="closePlayerModal()"
          class="w-10 h-10 rounded-full bg-background flex items-center justify-center text-gray-400 hover:text-white transition-colors border border-white/5">
          <span class="material-symbols-outlined text-[24px]">close</span>
        </button>
      </div>

      <div class="px-6 py-4 bg-background/50">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
            <span class="material-symbols-outlined text-[20px]">search</span>
          </span>
          <input type="text" id="modal_search" onkeyup="filterPlayers()" placeholder="Oyuncu ara..."
            class="w-full bg-background border border-white/10 rounded-2xl h-12 pl-12 pr-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" />
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-2" id="player_list_container">
        {% for p in players %}
        <div
          class="player-item group bg-surface rounded-2xl p-4 flex items-center justify-between cursor-pointer hover:bg-surface-highlight transition-all border border-transparent"
          data-pname="{{ p.name.lower() }}" onclick="togglePlayer('{{ p.id }}', '{{ p.name }}', this)">
          <div class="flex items-center gap-4">
            <img src="{{ p.photo_url or 'https://via.placeholder.com/150' }}"
              class="w-10 h-10 rounded-full object-cover border border-white/5 group-hover:grayscale-0 grayscale transition-all">
            <div>
              <p class="font-bold text-sm group-hover:text-primary transition-colors">{{ p.name }}</p>
              <p class="text-[10px] text-gray-500 uppercase font-bold">{{ p.team }}</p>
            </div>
          </div>
          <div
            class="selection-indicator w-8 h-8 rounded-full border border-white/10 flex items-center justify-center transition-all"
            data-pid="{{ p.id }}">
            <span class="material-symbols-outlined text-background text-[18px] opacity-0 font-black">check</span>
          </div>
        </div>
        {% endfor %}
      </div>

      <div class="p-6 border-t border-white/5 bg-surface/30">
        <button type="button" onclick="closePlayerModal()"
          class="w-full bg-primary text-black font-black tracking-widest rounded-2xl h-14 hover:shadow-neon hover:bg-white transition-all shadow-lg active:scale-95">
          KADROYU ONAYLA
        </button>
      </div>
    </div>
  </div>

  <style>
    .player-selected {
      border-color: rgba(57, 255, 20, 0.3) !important;
      background: rgba(57, 255, 20, 0.05) !important;
    }

    .player-selected .selection-indicator {
      background: #39ff14 !important;
      border-color: #39ff14 !important;
    }

    .player-selected .selection-indicator span {
      opacity: 1;
    }

    .player-selected img {
      grayscale: 0 !important;
    }
  </style>

  <script>
    let currentModalTeam = '';
    let homeLineup = [];
    let awayLineup = [];
    let goals = [];

    // Today's date default
    document.getElementById('date').valueAsDate = new Date();

    // Update team names in goal form selectively
    document.getElementById('team1').addEventListener('input', (e) => {
      document.getElementById('opt_home').textContent = e.target.value || 'Ev Sahibi';
    });
    document.getElementById('team2').addEventListener('input', (e) => {
      document.getElementById('opt_away').textContent = e.target.value || 'Deplasman';
    });

    function openPlayerModal(team) {
      currentModalTeam = team;
      document.getElementById('modal_title_text').textContent = team === 'home' ? 'Ev Sahibi Kadrosu' : 'Deplasman Kadrosu';
      document.getElementById('playerModal').classList.remove('hidden');
      document.getElementById('modal_search').value = '';
      filterPlayers();
      renderSelectionStates();
    }

    function closePlayerModal() {
      document.getElementById('playerModal').classList.add('hidden');
      updateLineupDisplay();
    }

    function togglePlayer(id, name, el) {
      let lineup = currentModalTeam === 'home' ? homeLineup : awayLineup;
      const index = lineup.findIndex(p => p.id === id);

      if (index > -1) {
        lineup.splice(index, 1);
      } else {
        lineup.push({ id: id, name: name });
      }
      renderSelectionStates();
    }

    function renderSelectionStates() {
      let lineup = currentModalTeam === 'home' ? homeLineup : awayLineup;
      const items = document.querySelectorAll('.player-item');
      items.forEach(item => {
        const pid = item.querySelector('.selection-indicator').dataset.pid;
        const isSelected = lineup.some(p => p.id === pid);
        if (isSelected) item.classList.add('player-selected');
        else item.classList.remove('player-selected');
      });
    }

    function updateLineupDisplay() {
      const homeList = document.getElementById('home_selected_list');
      const awayList = document.getElementById('away_selected_list');
      const homeCount = document.getElementById('home_count_label');
      const awayCount = document.getElementById('away_count_label');

      homeCount.textContent = homeLineup.length > 0 ? `${homeLineup.length} Oyuncu Seçildi` : 'Oyuncu Seçilmedi';
      awayCount.textContent = awayLineup.length > 0 ? `${awayLineup.length} Oyuncu Seçildi` : 'Oyuncu Seçilmedi';

      homeList.innerHTML = homeLineup.map(p => `<span class="px-2 py-1 bg-white/5 rounded-md text-[9px] border border-white/5 font-bold text-white/50">${p.name}</span>`).join('');
      awayList.innerHTML = awayLineup.map(p => `<span class="px-2 py-1 bg-white/5 rounded-md text-[9px] border border-white/5 font-bold text-white/50">${p.name}</span>`).join('');

      document.getElementById('home_lineup_hidden').value = JSON.stringify(homeLineup.map(p => p.id));
      document.getElementById('away_lineup_hidden').value = JSON.stringify(awayLineup.map(p => p.id));
    }

    function addGoal() {
      const minute = document.getElementById('goal-minute').value;
      const team = document.getElementById('scoring-team').value;
      const scorerSelect = document.getElementById('scorer');
      const scorerId = scorerSelect.value;
      const scorerName = scorerSelect.options[scorerSelect.selectedIndex].text;
      const scorerPhoto = scorerSelect.options[scorerSelect.selectedIndex].dataset.photo || 'https://via.placeholder.com/150';
      const assistSelect = document.getElementById('assist');
      const assistId = assistSelect.value;
      const assistName = assistId ? assistSelect.options[assistSelect.selectedIndex].text : '';

      if (!minute || !scorerId) {
        alert('Zəhmət olmasa dəqiqə və oyunçu seçin!');
        return;
      }

      goals.push({
        minute: minute + "'",
        team: team,
        scorer_id: scorerId,
        scorer_name: scorerName,
        scorer_photo: scorerPhoto,
        assist_id: assistId,
        assist_name: assistName
      });

      renderGoalsList();

      // Clear inputs
      document.getElementById('goal-minute').value = '';
      scorerSelect.value = '';
      assistSelect.value = '';
    }

    function renderGoalsList() {
      const list = document.getElementById('goals_list');
      const badge = document.getElementById('goal_count_badge');
      let hScore = 0;
      let aScore = 0;

      if (goals.length === 0) {
        list.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">Henüz gol eklenmedi</p>';
        badge.textContent = '0 GOL';
      } else {
        list.innerHTML = goals.map((g, idx) => {
          if (g.team === 'home') hScore++; else aScore++;
          const scoreAtMoment = `${hScore}-${aScore}`;

          return `
                        <div class="group flex items-center gap-4 p-4 rounded-2xl bg-surface border border-white/5 hover:border-primary/30 hover:bg-surface-highlight transition-all duration-300 shadow-lg">
                            <div class="flex flex-col items-center justify-center h-12 w-12 rounded-xl bg-background border border-white/10 text-primary font-bold font-mono text-sm shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
                                ${g.minute}
                            </div>
                            <div class="relative">
                                <img alt="${g.scorer_name}" class="h-10 w-10 rounded-full object-cover ring-2 ring-black grayscale group-hover:grayscale-0 transition-all" src="${g.scorer_photo}">
                                <div class="absolute -bottom-1 -right-1 bg-primary text-black text-[8px] font-bold px-1 rounded-sm">${g.team === 'home' ? 'HOME' : 'AWAY'}</div>
                            </div>
                            <div class="flex-grow">
                                <p class="font-bold text-white text-sm group-hover:text-primary transition-colors">${g.scorer_name}</p>
                                <div class="flex items-center gap-1 text-xs text-white/40">
                                    <span class="material-symbols-outlined text-[12px]">${g.assist_name ? 'sports_soccer' : 'block'}</span>
                                    <span>${g.assist_name ? 'Asist: ' + g.assist_name : 'Asistsiz'}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-bold font-mono text-white bg-white/5 px-2 py-1 rounded-lg border border-white/5">${scoreAtMoment}</span>
                                <button type="button" onclick="removeGoal(${idx})" class="text-white/20 hover:text-red-500 transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">delete</span>
                                </button>
                            </div>
                        </div>
                    `;
        }).join('');
        badge.textContent = `${goals.length} GOL`;
      }

      document.getElementById('home_score_hidden').value = hScore;
      document.getElementById('away_score_hidden').value = aScore;
      document.getElementById('goals_data_hidden').value = JSON.stringify(goals);
    }

    function removeGoal(idx) {
      goals.splice(idx, 1);
      renderGoalsList();
    }

    function filterPlayers() {
      const q = document.getElementById('modal_search').value.toLowerCase();
      document.querySelectorAll('.player-item').forEach(item => {
        const name = item.dataset.pname;
        item.style.display = name.includes(q) ? 'flex' : 'none';
      });
    }
  </script>
</body>

</html>
